<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS DeepScan | RV Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(15, 20, 36, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .prose-invert { color: #cbd5e1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold text-white">ATS DeepScan v2.0</h1>
        
        <input type="password" id="key" placeholder="Enter OpenRouter API Key" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-lg text-white">
        
        <div class="grid md:grid-cols-2 gap-4">
            <textarea id="jd" placeholder="Paste Job Description here..." class="w-full h-64 p-4 bg-slate-900 border border-slate-700 rounded-lg text-sm"></textarea>
            <textarea id="resume" placeholder="Paste Resume text here..." class="w-full h-64 p-4 bg-slate-900 border border-slate-700 rounded-lg text-sm"></textarea>
        </div>
        
        <button id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-lg transition-all">Analyze Alignment</button>
        
        <div id="out" class="p-6 bg-slate-900 rounded-lg border border-slate-800 prose prose-invert max-w-none">
            Analysis results will appear here...
        </div>
    </div>

    <script>
        // Fallback array: If the first model is busy, we cycle through these
        const MODELS = [
            "meta-llama/llama-3.1-8b-instruct:free",
            "google/gemini-2.0-flash-lite-preview-02-05:free"
        ];

        async function callOpenRouter(key, jd, resume, modelIndex = 0) {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                body: JSON.stringify({
                    "model": MODELS[modelIndex],
                    "messages": [{ "role": "user", "content": `Compare Resume to JD. Give score + suggestions.\n\nJD: ${jd}\n\nResume: ${resume}` }]
                })
            });

            const data = await response.json();
            
            // Logic: If model fails, try the next one in the array
            if (data.error && modelIndex < MODELS.length - 1) {
                console.warn(`Model ${MODELS[modelIndex]} failed, trying ${MODELS[modelIndex+1]}`);
                return callOpenRouter(key, jd, resume, modelIndex + 1);
            }
            
            if (data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        }

        document.getElementById('btn').onclick = async () => {
            const key = document.getElementById('key').value || localStorage.getItem('k');
            const jd = document.getElementById('jd').value;
            const resume = document.getElementById('resume').value;
            const out = document.getElementById('out');
            
            if(!key || !jd || !resume) return alert("Please fill all fields.");
            localStorage.setItem('k', key);
            out.innerHTML = "Processing deep analysis...";
            
            try {
                const result = await callOpenRouter(key, jd, resume);
                out.innerHTML = marked.parse(result);
            } catch(e) {
                out.innerHTML = `<p class='text-red-500'><strong>Analysis Failed:</strong> ${e.message}</p>`;
            }
        };
    </script>
</body>
</html>
