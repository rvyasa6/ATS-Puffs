<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATS DeepScan | RV Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold">ATS DeepScan Engine</h1>
        
        <input type="password" id="key" placeholder="Enter OpenRouter API Key" class="w-full p-3 bg-gray-800 rounded border border-gray-700">
        
        <div class="grid grid-cols-2 gap-4">
            <textarea id="jd" placeholder="Job Description" class="w-full h-40 p-3 bg-gray-800 rounded border border-gray-700"></textarea>
            <textarea id="resume" placeholder="Resume Text" class="w-full h-40 p-3 bg-gray-800 rounded border border-gray-700"></textarea>
        </div>
        
        <button id="btn" class="w-full bg-blue-600 p-3 rounded font-bold">Run Analysis</button>
        
        <div id="out" class="p-4 bg-gray-800 rounded min-h-[100px]">Waiting for analysis...</div>
    </div>

    <script>
        document.getElementById('btn').onclick = async () => {
            const key = document.getElementById('key').value || localStorage.getItem('k');
            const jd = document.getElementById('jd').value;
            const resume = document.getElementById('resume').value;
            const out = document.getElementById('out');

            if(!key || !jd || !resume) return alert("All fields required");
            localStorage.setItem('k', key);
            out.innerText = "Analyzing...";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        "model": "meta-llama/llama-3.3-70b-instruct:free",
                        "messages": [
                            {
                                "role": "user",
                                "content": `Compare this Job Description to this Resume. Provide a match score and suggestions.\n\nJD: ${jd}\n\nResume: ${resume}`
                            }
                        ]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                out.innerHTML = marked.parse(data.choices[0].message.content);
            } catch(e) {
                out.innerText = "Error: " + e.message;
            }
        };
    </script>
</body>
</html>
