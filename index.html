<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS DeepScan | RV Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-4 md:p-10 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-white">ATS DeepScan Analysis</h1>
        
        <div class="space-y-4">
            <input type="password" id="key" placeholder="Enter OpenRouter API Key" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-lg text-white">
            
            <div class="grid md:grid-cols-2 gap-4">
                <textarea id="jd" placeholder="Paste Job Description" class="w-full h-64 p-4 bg-slate-900 border border-slate-700 rounded-lg"></textarea>
                <textarea id="resume" placeholder="Paste Resume Text" class="w-full h-64 p-4 bg-slate-900 border border-slate-700 rounded-lg"></textarea>
            </div>
            
            <button id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-lg transition-all">Analyze Alignment</button>
        </div>

        <div id="out" class="mt-8 p-6 bg-slate-900 rounded-lg border border-slate-800 prose prose-invert max-w-none">
            Analysis results will appear here...
        </div>
    </div>

    <script>
        document.getElementById('btn').onclick = async () => {
            const key = document.getElementById('key').value || localStorage.getItem('k');
            const jd = document.getElementById('jd').value;
            const resume = document.getElementById('resume').value;
            const out = document.getElementById('out');

            if(!key || !jd || !resume) return alert("All fields are required.");
            localStorage.setItem('k', key);
            out.innerHTML = "Querying model...";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-lite-preview-02-05:free",
                        "messages": [
                            {
                                "role": "user",
                                "content": `Analyze this Resume against this Job Description. Provide: 1. A match score (0-100%). 2. Missing keywords. 3. Suggestions for improvement. JD: ${jd} \n\n Resume: ${resume}`
                            }
                        ]
                    })
                });

                const result = await response.json();
                
                if(result.error) {
                    console.error("API Error Details:", result.error);
                    throw new Error(result.error.message || "Unknown API Error");
                }
                
                out.innerHTML = marked.parse(result.choices[0].message.content);
            } catch(e) {
                out.innerHTML = `<div class='text-red-500'><strong>Analysis Failed:</strong> ${e.message}<br><br>Check browser console (F12) for more details.</div>`;
            }
        };
    </script>
</body>
</html>
