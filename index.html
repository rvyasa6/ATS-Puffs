<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS DeepScan | RV Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-6 font-sans">
    <div class="max-w-4xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold text-white">ATS DeepScan Routing Engine</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="password" id="key" placeholder="OpenRouter API Key" class="p-3 bg-slate-900 border border-slate-700 rounded-lg">
            <select id="model-select" class="p-3 bg-slate-900 border border-slate-700 rounded-lg">
                <option value="google/gemini-flash-1.5-8b">Google Gemini Flash 1.5</option>
                <option value="meta-llama/llama-3.1-8b-instruct">Meta Llama 3.1 8B</option>
                <option value="qwen/qwen-2.5-7b-instruct">Qwen 2.5 7B</option>
            </select>
        </div>

        <textarea id="jd" placeholder="Paste Job Description..." class="w-full h-32 p-4 bg-slate-900 border border-slate-700 rounded-lg"></textarea>
        <textarea id="resume" placeholder="Paste Resume text..." class="w-full h-32 p-4 bg-slate-900 border border-slate-700 rounded-lg"></textarea>
        
        <button id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-lg font-bold">Route & Analyze</button>
        
        <div id="out" class="p-6 bg-slate-900 rounded-lg border border-slate-800 prose prose-invert max-w-none">Analysis results...</div>
    </div>

    <script>
        document.getElementById('btn').onclick = async () => {
            const key = document.getElementById('key').value || localStorage.getItem('k');
            const model = document.getElementById('model-select').value;
            const jd = document.getElementById('jd').value;
            const resume = document.getElementById('resume').value;
            const out = document.getElementById('out');
            
            if(!key || !jd || !resume) return alert("Fill all fields.");
            localStorage.setItem('k', key);
            out.innerHTML = `Routing to ${model}...`;
            
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [{ "role": "user", "content": `Analyze Resume vs JD:\nJD: ${jd}\nResume: ${resume}` }]
                    })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                out.innerHTML = marked.parse(data.choices[0].message.content);
            } catch(e) {
                out.innerHTML = `<p class='text-red-500'>Routing Failed: ${e.message}</p>`;
            }
        };
    </script>
</body>
</html>
