<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS DeepScan | RV Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #e2e8f0; }
        .glass { background: rgba(15, 20, 36, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .prose-invert { color: #94a3b8; }
        .prose-invert h2 { color: #ffffff; font-weight: 600; margin-top: 1.5rem; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-5xl mx-auto mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-semibold text-white">ATS DeepScan</h1>
            <p class="text-xs text-indigo-400 uppercase tracking-widest font-bold">Ronak Vyas Engineering</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <div class="glass rounded-3xl p-8 border border-white/5 shadow-2xl space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">OpenRouter API Key</label>
                <input type="password" id="api-key" placeholder="sk-or-v1-..." class="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <textarea id="jd" placeholder="Paste Job Description..." class="w-full h-64 bg-black/40 border border-white/5 rounded-2xl p-6 text-sm text-slate-300 outline-none resize-none"></textarea>
                <textarea id="resume-text" placeholder="Paste Resume Data here..." class="w-full h-64 bg-black/40 border border-white/5 rounded-2xl p-6 text-sm text-slate-300 outline-none resize-none"></textarea>
            </div>
            
            <button id="scan-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-4 rounded-2xl transition-all shadow-lg">Analyze Alignment</button>
        </div>

        <div id="output" class="mt-12 glass rounded-3xl p-8 border border-white/5 min-h-[200px] prose prose-invert max-w-none">
            <p class="text-center text-slate-500 italic">Results will appear here...</p>
        </div>
    </main>

    <script>
        document.getElementById('scan-btn').onclick = async () => {
            const rawKey = document.getElementById('api-key').value || localStorage.getItem('ats_key') || "";
            const key = rawKey.trim().replace(/[^\x00-\x7F]/g, "");
            const jd = document.getElementById('jd').value;
            const resume = document.getElementById('resume-text').value;
            const output = document.getElementById('output');

            if (!key || !jd || !resume) return alert("All fields are required.");
            
            localStorage.setItem('ats_key', key);
            output.innerHTML = "Analyzing...";

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": "Bearer " + key, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "meta-llama/llama-3.3-70b-instruct:free",
                        messages: [
                            { role: "system", content: "You are an expert ATS. Analyze JD and Resume text. Output structured Markdown." },
                            { role: "user", content: `JD: ${jd}\n\nResume: ${resume}` }
                        ]
                    })
                });
                
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                output.innerHTML = marked.parse(data.choices[0].message.content);
            } catch (err) {
                output.innerHTML = `<p class="text-red-400">Error: ${err.message}</p>`;
            }
        };
    </script>
</body>
</html>
