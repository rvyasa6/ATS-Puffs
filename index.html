<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS DeepScan | Ronak Vyas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #e2e8f0; }
        .glass { background: rgba(15, 20, 36, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .prose-invert { color: #94a3b8; }
        .prose-invert h2 { color: #ffffff; font-weight: 600; margin-top: 1.5rem; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-5xl mx-auto mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-semibold text-white">ATS DeepScan</h1>
            <p class="text-xs text-indigo-400 uppercase tracking-widest font-bold">Ronak Vyas Engineering</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-500"></div>
    </header>

    <main class="max-w-5xl mx-auto">
        <div class="glass rounded-3xl p-8 border border-white/5 shadow-2xl space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">OpenRouter API Key</label>
                <input type="password" id="api-key" placeholder="Paste your sk-or-v1 key here..." class="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <textarea id="jd" placeholder="Paste the Job Description here..." class="w-full h-64 bg-black/40 border border-white/5 rounded-2xl p-6 text-sm text-slate-300 focus:border-indigo-500/50 outline-none resize-none"></textarea>
                
                <div class="flex flex-col gap-4">
                    <label class="flex-grow border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-all">
                        <span class="text-indigo-400 font-medium">Upload Resume (PDF/DOCX)</span>
                        <input type="file" id="resume-file" class="hidden">
                    </label>
                    <button id="scan-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-900/20">Analyze Alignment</button>
                </div>
            </div>
        </div>

        <div id="output" class="mt-12 glass rounded-3xl p-8 border border-white/5 min-h-[200px] prose prose-invert max-w-none">
            <p class="text-center text-slate-500 italic">Analysis results will appear here after processing...</p>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function extractText(file) {
            const buffer = await file.arrayBuffer();
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'docx') return (await mammoth.extractRawText({ arrayBuffer: buffer })).value;
            if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    text += (await page.getTextContent()).items.map(item => item.str).join(' ');
                }
                return text;
            }
            return new TextDecoder().decode(buffer);
        }

        document.getElementById('scan-btn').onclick = async () => {
            const key = document.getElementById('api-key').value || localStorage.getItem('ats_key');
            const jd = document.getElementById('jd').value;
            const fileInput = document.getElementById('resume-file');
            const output = document.getElementById('output');

            if (!key || !jd || fileInput.files.length === 0) return alert("Please provide Key, JD, and a Resume file.");
            
            localStorage.setItem('ats_key', key);
            output.innerHTML = "Processing deep analysis...";

            try {
                const resumeText = await extractText(fileInput.files[0]);
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${key}`, 
                        "Content-Type": "application/json", 
                        "HTTP-Referer": window.location.origin, 
                        "X-Title": "ATS DeepScan" 
                    },
                    body: JSON.stringify({
                        model: "meta-llama/llama-3.3-70b-instruct:free",
                        messages: [
                            { role: "system", content: "You are an expert ATS recruiter. Analyze the JD and Resume provided. Compare Hard Skills, Experience, and Soft Skills. Output in structured Markdown." },
                            { role: "user", content: `JD: ${jd}\n\nResume: ${resumeText}` }
                        ]
                    })
                });
                
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                output.innerHTML = marked.parse(data.choices[0].message.content);
            } catch (err) {
                output.innerHTML = `<p class="text-red-400">Error: ${err.message}</p>`;
            }
        };
    </script>
</body>
</html>
